name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------------
  # TypeScript / Node.js
  # -------------------------------------------------------------------------
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pyhsm-ts

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: pyhsm-ts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: ESLint
        run: npx eslint .

      - name: Prettier check
        run: npx prettier --check "*.ts"

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Audit dependencies
        run: npm audit --omit=dev

  # -------------------------------------------------------------------------
  # Python
  # -------------------------------------------------------------------------
  python:
    name: Python
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cryptography pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # -------------------------------------------------------------------------
  # Combined gate — both jobs must pass
  # -------------------------------------------------------------------------
  all-checks:
    name: All checks passed
    needs: [typescript, python]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All CI checks passed."
