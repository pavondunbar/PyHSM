name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pyhsm-ts

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: pyhsm-ts/package-lock.json

      - run: npm ci

      - name: Type check
        run: npm run lint

      - name: ESLint
        run: npx eslint .

      - name: Prettier check
        run: npx prettier --check "*.ts"

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Audit dependencies
        run: npm audit --omit=dev
